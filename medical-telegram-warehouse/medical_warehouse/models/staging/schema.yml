version: 2

sources:
  - name: raw
    description: "Raw data loaded from the data lake"
    schema: raw
    tables:
      - name: telegram_messages
        description: "Raw Telegram messages scraped from medical channels"
        columns:
          - name: message_id
            description: "Unique identifier for each message"
            tests:
              - unique
              - not_null
          - name: channel_name
            description: "Name of the Telegram channel"
          - name: message_date
            description: "Timestamp of the message"
          - name: message_text
            description: "Full text content of the message"
          - name: has_media
            description: "Whether the message contains media"
          - name: image_path
            description: "Path to downloaded image if applicable"
          - name: views
            description: "Number of views on the message"
          - name: forwards
            description: "Number of times the message was forwarded"
          - name: loaded_at
            description: "Timestamp when the record was loaded to the database"

models:
  - name: stg_telegram_messages
    description: "Cleaned and standardized Telegram messages from raw data"
    columns:
      - name: message_id
        description: "Unique identifier for each message"
        tests:
          - unique
          - not_null
      - name: channel_name
        description: "Name of the Telegram channel"
      - name: message_date
        description: "Timestamp of the message"
        tests:
          - not_null
      - name: message_text
        description: "Full text content of the message"
      - name: message_length
        description: "Length of the message text"
      - name: has_media
        description: "Whether the message contains media"
      - name: has_image
        description: "Whether the message has an image"
      - name: image_path
        description: "Path to downloaded image if applicable"
      - name: views
        description: "Number of views on the message"
      - name: forwards
        description: "Number of times the message was forwarded"
      - name: message_date_only
        description: "Date part of the message timestamp for joining"
    tests:
      - assert_no_future_messages
      - assert_positive_views
